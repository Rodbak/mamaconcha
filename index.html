@keyframes mcRise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes mcReveal{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
#mc-header{position:sticky;top:0;z-index:40;background:rgba(16,14,11,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
#mc-search{position:fixed;left:0;right:0;top:0;z-index:60;background:var(--panel);border-bottom:1px solid var(--line);transform:translateY(-100%);opacity:0;pointer-events:none;transition:transform .35s cubic-bezier(.2,.8,.2,1),opacity .25s}
#mc-search.open{transform:translateY(0);opacity:1;pointer-events:auto}
#mc-overlay{position:fixed;inset:0;z-index:70;background:rgba(8,7,5,.6);opacity:0;pointer-events:none;transition:opacity .3s;cursor:pointer}
#mc-overlay.open{opacity:1;pointer-events:auto}
#mc-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;z-index:80;background:var(--base);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .38s cubic-bezier(.2,.85,.2,1);display:flex;flex-direction:column}
#mc-drawer.open{transform:translateX(0)}
#mc-toast{position:fixed;left:50%;bottom:32px;z-index:90;background:var(--text);color:#100E0B;font-weight:700;font-size:13px;letter-spacing:.04em;padding:13px 22px;border-radius:30px;opacity:0;transform:translateX(-50%) translateY(14px);transition:opacity .3s ease,transform .3s cubic-bezier(.2,.85,.2,1);pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap}
#mc-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.mc-reveal{opacity:0;transform:translateY(30px);transition:opacity .9s ease,transform .9s ease}
.mc-reveal.visible{opacity:1;transform:none}
.mc-inp{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:14px 16px;color:var(--text);font-size:14px;outline:none}
.mc-inp:focus{border-color:var(--accent)}
.mc-btn-acc{appearance:none;border:none;background:var(--accent);color:#100E0B;font-weight:700;font-size:14px;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:background .2s}
.mc-btn-acc:hover{background:var(--text)}
.mc-btn-out{appearance:none;border:1px solid var(--line);background:transparent;color:var(--text);font-weight:600;font-size:14px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:border-color .2s}
.mc-btn-out:hover{border-color:var(--text)}
.card-tile{aspect-ratio:3/4;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:16px;transition:filter .35s ease}
.card-tile:hover{filter:brightness(1.08)}
.card-wrap{cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:transform .32s cubic-bezier(.2,.7,.2,1)}
.card-wrap:hover{transform:translateY(-7px)}
.card-add-btn{appearance:none;border:1px solid var(--line);background:transparent;color:var(--text);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:11px;cursor:pointer;border-radius:2px;transition:background .2s,border-color .2s,color .2s}
.card-add-btn:hover{background:var(--accent);border-color:var(--accent);color:#100E0B}
</style>

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  screen:'home', cart:[], drawerOpen:false, searchOpen:false,
  activeCat:'All', sort:'featured', search:'', selectedId:null,
  selSize:'M', selQty:1, toast:'', orderNo:'',
  lang:(()=>{try{return localStorage.getItem('mc_lang')||'en'}catch(e){return'en'}})(),
};
let _toastTimer = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const tr = k => (T[state.lang]||T.en)[k] || (T.en[k]||'');
const catStr = n => ((T[state.lang]||T.en).cat||{})[n]||n;
const tagStr = t => t ? (((T[state.lang]||T.en).tag||{})[t]||t) : '';
const money = n => '$'+n;
const sizesFor = p => p.category==='Accessories'?['One Size']:['S','M','L','XL','XXL'];
const find = id => catalog.find(p=>p.id===id);
const thr = 200;

function cartTotals(){
  const cartCount = state.cart.reduce((a,c)=>a+c.qty,0);
  const subtotal = state.cart.reduce((a,c)=>a+find(c.id).price*c.qty,0);
  const shipping = (subtotal===0||subtotal>=thr)?0:12;
  const total = subtotal+shipping;
  const remaining = Math.max(0,thr-subtotal);
  return {cartCount,subtotal,shipping,total,remaining};
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function go(screen){ setState({screen,drawerOpen:false,searchOpen:false}); window.scrollTo(0,0); }
function navCat(cat){ setState({activeCat:cat,screen:'shop',drawerOpen:false,searchOpen:false,search:''}); window.scrollTo(0,0); }
function openProduct(id){
  const p=find(id); const sz=sizesFor(p);
  setState({selectedId:id,screen:'product',selSize:sz.indexOf('M')>=0?'M':sz[0],selQty:1,drawerOpen:false,searchOpen:false});
  window.scrollTo(0,0);
}

// ── CART ──────────────────────────────────────────────────────────────────────
function addToCart(id,size,qty){
  const cart=[...state.cart]; const i=cart.findIndex(c=>c.id===id&&c.size===size);
  if(i>=0) cart[i]={...cart[i],qty:cart[i].qty+qty}; else cart.push({id,size,qty});
  setState({cart,drawerOpen:true});
  showToast(tr('toast_added'));
}
function quickAdd(id){ const p=find(id); const sz=sizesFor(p); addToCart(id,sz.indexOf('M')>=0?'M':sz[0],1); }
function changeQty(id,size,delta){
  const cart=[...state.cart]; const i=cart.findIndex(c=>c.id===id&&c.size===size);
  if(i<0) return; const q=cart[i].qty+delta;
  if(q<=0) cart.splice(i,1); else cart[i]={...cart[i],qty:q};
  setState({cart});
}
function removeItem(id,size){ setState({cart:state.cart.filter(c=>!(c.id===id&&c.size===size))}); }
function placeOrder(){ const no='MC-'+Math.floor(100000+Math.random()*900000); setState({screen:'confirm',cart:[],drawerOpen:false,orderNo:no}); window.scrollTo(0,0); }

// ── MISC ──────────────────────────────────────────────────────────────────────
function setLang(l){ try{localStorage.setItem('mc_lang',l)}catch(e){} setState({lang:l}); }
function toggleDrawer(){ setState({drawerOpen:!state.drawerOpen}); }
function closeDrawer(){ setState({drawerOpen:false}); }
function toggleSearch(){ setState({searchOpen:!state.searchOpen}); if(!state.searchOpen) setTimeout(()=>{const i=document.getElementById('mc-s-input');if(i)i.focus();},50); }
function closeSearch(){ setState({searchOpen:false}); }
function submitSearch(){ setState({screen:'shop',searchOpen:false,activeCat:'All'}); window.scrollTo(0,0); }
function setSort(v){ setState({sort:v}); }
function setActiveCat(c){ setState({activeCat:c}); }
function setSelSize(s){ setState({selSize:s}); }
function incQty(){ setState({selQty:Math.min(9,state.selQty+1)}); }
function decQty(){ setState({selQty:Math.max(1,state.selQty-1)}); }
function addSelToCart(){ if(!state.selectedId) return; addToCart(state.selectedId,state.selSize,state.selQty); }
function goCheckout(){ setState({screen:'checkout',drawerOpen:false}); window.scrollTo(0,0); }

function showToast(msg){
  clearTimeout(_toastTimer);
  const el=document.getElementById('mc-toast');
  el.innerHTML='&#10003; '+msg; el.classList.add('show');
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

const clothSm = c => `background-color:${c};background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.11) 0 2px,transparent 2px 12px),repeating-linear-gradient(-45deg,rgba(255,255,255,.06) 0 2px,transparent 2px 12px),radial-gradient(circle at 50% 24%,rgba(255,255,255,.14),transparent 56%)`;
const clothLg = c => `background-color:${c};background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.12) 0 2px,transparent 2px 13px),repeating-linear-gradient(-45deg,rgba(255,255,255,.07) 0 2px,transparent 2px 13px),radial-gradient(circle at 50% 22%,rgba(255,255,255,.16),transparent 58%)`;

// ── FILTERED CATALOG ──────────────────────────────────────────────────────────
function filtered(){
  let list=[...catalog];
  if(state.activeCat!=='All') list=list.filter(p=>p.category===state.activeCat);
  const q=state.search.trim().toLowerCase();
  if(q) list=list.filter(p=>(p.name+' '+p.category+' '+p.colorName).toLowerCase().includes(q));
  if(state.sort==='low') list.sort((a,b)=>a.price-b.price);
  else if(state.sort==='high') list.sort((a,b)=>b.price-a.price);
  else if(state.sort==='newest') list.sort((a,b)=>(b.tag==='New'?1:0)-(a.tag==='New'?1:0));
  return list;
}

        <span onclick="go('shop')" style="cursor:pointer" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">${tr('f_all')}</span>
      </div>
    </div>
    <div>
      <div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text);font-weight:700;margin-bottom:14px">${tr('f_help')}</div>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;color:var(--muted)">
        <span style="cursor:pointer" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">${tr('help_ship')}</span>
        <span style="cursor:pointer" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">${tr('help_size')}</span>
        <span onclick="go('fit')" style="cursor:pointer" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">${tr('help_fit')}</span>
        <span style="cursor:pointer" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--muted)'">${tr('help_contact')}</span>
      </div>
    </div>
    <div>
      <div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text);font-weight:700;margin-bottom:14px">${tr('f_news')}</div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 12px">${tr('news_sub')}</p>
      <div style="display:flex;border:1px solid var(--line);border-radius:3px;overflow:hidden">
        <input placeholder="${tr('news_ph')}" style="flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;padding:11px 12px">
        <button style="appearance:none;border:none;background:var(--accent);color:#100E0B;font-weight:700;font-size:12px;padding:0 16px;cursor:pointer">&rarr;</button>
      </div>
    </div>
  </div>
  <div style="max-width:1280px;margin:0 auto;padding:18px 28px 40px;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted)">
    <span>${tr('rights')}</span>
    <span>${tr('legal')}</span>
  </div>`;
}

// ── BUILD: CART DRAWER ────────────────────────────────────────────────────────
function buildDrawer(){
  const {cartCount,subtotal,shipping,total,remaining}=cartTotals();
  const t2=T[state.lang]||T.en;
  const shippingLabel=shipping===0?t2.free_label:money(shipping);
  const freeRemLabel=remaining>0?(t2.free_rem_a+money(remaining)+t2.free_rem_b):t2.free_unlocked;
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--line)">
    <div style="font-family:'Anton';font-size:22px;text-transform:uppercase">${t2.cart_title}</div>
    <button onclick="closeDrawer()" style="appearance:none;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1">&times;</button>
  </div>
  ${state.cart.length===0?`
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center">
    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--line)" stroke-width="1.6"><path d="M6 8h12l-1 12H7L6 8z"></path><path d="M9 8V6a3 3 0 0 1 6 0v2"></path></svg>
    <div style="font-size:15px;color:var(--muted)">${t2.cart_empty}</div>
    <button class="mc-btn-out" onclick="closeDrawer();go('shop')" style="padding:13px 22px;font-size:13px">${t2.start_shopping}</button>
  </div>`:`
  <div style="flex:1;overflow-y:auto;padding:8px 24px">
    ${state.cart.map(c=>{const p=find(c.id);return `
      <div style="display:flex;gap:14px;padding:18px 0;border-bottom:1px solid var(--line)">
        <div style="width:64px;height:80px;border-radius:3px;flex-shrink:0;${imgBgSm(p)}"></div>
        <div style="flex:1;display:flex;flex-direction:column">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div style="font-size:14px;font-weight:600">${p.name}</div>
            <div style="font-size:14px;font-weight:700">${money(p.price*c.qty)}</div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:auto">${t2.size_word} ${c.size} &middot; ${p.colorName}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
            <div style="display:flex;align-items:center;border:1px solid var(--line);border-radius:3px">
              <button onclick="changeQty('${c.id}','${c.size}',-1)" style="appearance:none;background:transparent;border:none;color:var(--text);width:30px;height:30px;font-size:16px;cursor:pointer">&minus;</button>
              <span style="width:26px;text-align:center;font-size:13px;font-weight:700">${c.qty}</span>
              <button onclick="changeQty('${c.id}','${c.size}',1)" style="appearance:none;background:transparent;border:none;color:var(--text);width:30px;height:30px;font-size:16px;cursor:pointer">+</button>
            </div>
            <button onclick="removeItem('${c.id}','${c.size}')" style="appearance:none;background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline">${t2.remove_word}</button>
          </div>
        </div>
      </div>`}).join('')}
  </div>
  <div style="border-top:1px solid var(--line);padding:20px 24px">
    <div style="font-size:12px;color:var(--accent2);margin-bottom:12px;text-align:center">${freeRemLabel}</div>
    <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:6px"><span>${t2.sub_word}</span><span style="color:var(--text);font-weight:700">${money(subtotal)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:16px"><span>${t2.total_word}</span><span>${money(total)}</span></div>
    <button class="mc-btn-acc" onclick="goCheckout()" style="width:100%;padding:16px">${t2.checkout_word}</button>
  </div>`}`;
}

// ── STATE MACHINE ─────────────────────────────────────────────────────────────
function setState(patch){
  const prev={...state};
  Object.assign(state,patch);

  // Language change: full re-render
  if('lang' in patch){ renderAll(); return; }

  // Screen / product change
  if('screen' in patch||'selectedId' in patch||'orderNo' in patch){
    renderMain(); setupReveal(); return;
  }

  // Shop filters
  if('activeCat' in patch||'sort' in patch){
    if(state.screen==='shop') renderMain(); return;
  }

  // Size/qty changes on product page
  if('selSize' in patch||'selQty' in patch){
    const sp=document.getElementById('mc-size-picker');
    const qa=document.getElementById('mc-qty-add');
    if(sp){
      const p=find(state.selectedId); if(!p) return;
      const sz=sizesFor(p);
      sp.innerHTML=sz.map(s=>{const on=s===state.selSize;return `<button onclick="setSelSize('${s}')" style="appearance:none;min-width:54px;padding:12px 14px;cursor:pointer;font-size:13px;font-weight:600;border-radius:3px;background:${on?'var(--accent)':'transparent'};color:${on?'#100E0B':'var(--text)'};border:1px solid ${on?'var(--accent)':'var(--line)'}">${s}</button>`;}).join('');
    }
    if(qa){
      const p=find(state.selectedId); if(!p) return;
      qa.innerHTML=`
        <div style="display:flex;align-items:center;border:1px solid var(--line);border-radius:3px">
          <button onclick="decQty()" style="appearance:none;background:transparent;border:none;color:var(--text);width:46px;height:54px;font-size:20px;cursor:pointer">−</button>
          <span style="width:38px;text-align:center;font-size:15px;font-weight:700">${state.selQty}</span>
          <button onclick="incQty()" style="appearance:none;background:transparent;border:none;color:var(--text);width:46px;height:54px;font-size:20px;cursor:pointer">+</button>
        </div>
        <button class="mc-btn-acc" onclick="addSelToCart()" style="flex:1;padding:0 20px">${tr('add_to_bag_word')} &middot; ${money(p.price)}</button>`;
    }
    return;
  }

  // Drawer toggle
  if('drawerOpen' in patch){
    document.getElementById('mc-drawer').classList.toggle('open',state.drawerOpen);
    document.getElementById('mc-overlay').classList.toggle('open',state.drawerOpen);
    return;
  }

  // Search toggle
  if('searchOpen' in patch){
    document.getElementById('mc-search').classList.toggle('open',state.searchOpen);
    return;
  }

  // Cart change
  if('cart' in patch){
    const {cartCount}=cartTotals();
    const badge=document.getElementById('mc-cart-badge');
    if(badge){ badge.textContent=cartCount; badge.style.display=cartCount>0?'flex':'none'; }
    document.getElementById('mc-drawer').innerHTML=buildDrawer();
    document.getElementById('mc-drawer').classList.toggle('open',state.drawerOpen);
    document.getElementById('mc-overlay').classList.toggle('open',state.drawerOpen);
    return;
  }
}

// ── SEARCH INPUT (no re-render) ───────────────────────────────────────────────
function onSearchInput(val){
  state.search=val;
  if(state.screen==='shop') renderMain();
}

// ── RENDER FUNCTIONS ──────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderSearchOverlay();
  renderMain();
  renderFooter();
  document.getElementById('mc-drawer').innerHTML=buildDrawer();
  document.getElementById('mc-drawer').classList.toggle('open',state.drawerOpen);
  document.getElementById('mc-overlay').classList.toggle('open',state.drawerOpen);
  document.getElementById('mc-search').classList.toggle('open',state.searchOpen);
  setupReveal();
}

function renderHeader(){
  document.getElementById('mc-header').innerHTML=buildHeader();
}

function renderSearchOverlay(){
  document.getElementById('mc-search').innerHTML=buildSearchOverlay();
}

function renderMain(){
  const el=document.getElementById('mc-main');
  switch(state.screen){
    case 'home': el.innerHTML=buildHome(); break;
    case 'shop': el.innerHTML=buildShop(); break;
    case 'product': el.innerHTML=buildProduct(); break;
    case 'checkout': el.innerHTML=buildCheckout(); break;
    case 'confirm': el.innerHTML=buildConfirm(); break;
    case 'fit': el.innerHTML=buildFit(); break;
    default: el.innerHTML=buildHome();
  }
  setupReveal();
}

function renderFooter(){
  const el=document.getElementById('mc-footer');
  el.style.cssText='border-top:1px solid var(--line);background:var(--panel);margin-top:20px';
  el.innerHTML=buildFooter();
}

// ── SCROLL REVEAL ─────────────────────────────────────────────────────────────
let _revealObs = null;
function setupReveal(){
  if(_revealObs) _revealObs.disconnect();
  _revealObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:0.08});
  document.querySelectorAll('.mc-reveal').forEach(el=>_revealObs.observe(el));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
